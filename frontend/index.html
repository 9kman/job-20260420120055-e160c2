<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SaaS MVP - Email & AI Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 18px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .email-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .email-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }
        .email-item:hover {
            background: #f8f9fa;
        }
        .email-item.unread {
            background: #f0f7ff;
        }
        .email-item.unread:hover {
            background: #e6f0ff;
        }
        .email-subject {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .email-sender {
            color: #666;
            font-size: 14px;
        }
        .email-preview {
            color: #999;
            font-size: 13px;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .usage-bar {
            background: #f0f0f0;
            border-radius: 8px;
            height: 20px;
            overflow: hidden;
            margin-top: 10px;
        }
        .usage-fill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
        }
        .usage-label {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 13px;
            color: #666;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI SaaS MVP</h1>
            <p class="subtitle">Claude API + Gmail + Outlook + SMTP Integration Platform</p>
        </header>

        <div class="dashboard">
            <div class="card">
                <h2>Subscription Status</h2>
                <div class="form-group">
                    <label>Tier</label>
                    <select id="subscription-tier">
                        <option value="free">Free</option>
                        <option value="pro">Pro</option>
                        <option value="enterprise">Enterprise</option>
                    </select>
                </div>
                <div class="usage-section">
                    <h3>Today's Usage</h3>
                    <div class="usage-bar">
                        <div class="usage-fill" id="ai-usage-fill" style="width: 0%"></div>
                    </div>
                    <div class="usage-label">
                        <span>AI Requests</span>
                        <span id="ai-usage-text">0 / 50</span>
                    </div>
                    <div class="usage-bar">
                        <div class="usage-fill" id="email-usage-fill" style="width: 0%"></div>
                    </div>
                    <div class="usage-label">
                        <span>Emails</span>
                        <span id="email-usage-text">0 / 10</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Connected Accounts</h2>
                <div class="form-group">
                    <label>Email Provider</label>
                    <select id="email-provider">
                        <option value="">Select provider...</option>
                        <option value="gmail">Gmail</option>
                        <option value="outlook">Outlook</option>
                    </select>
                </div>
                <button id="connect-btn" onclick="connectEmailAccount()">Connect Account</button>
                <div id="connected-accounts"></div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <h2>AI Compose</h2>
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('compose')">Compose</div>
                    <div class="tab" onclick="switchTab('summarize')">Summarize</div>
                    <div class="tab" onclick="switchTab('respond')">Respond</div>
                </div>

                <div id="compose-tab" class="tab-content active">
                    <div class="form-group">
                        <label>Recipient</label>
                        <input type="email" id="compose-recipient" placeholder="recipient@example.com">
                    </div>
                    <div class="form-group">
                        <label>Context / Key Points</label>
                        <textarea id="compose-context" rows="4" placeholder="Enter the context and key points for the email..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Tone</label>
                        <select id="compose-tone">
                            <option value="professional">Professional</option>
                            <option value="friendly">Friendly</option>
                            <option value="formal">Formal</option>
                            <option value="casual">Casual</option>
                        </select>
                    </div>
                    <button id="compose-btn" onclick="composeEmail()">Generate Email</button>
                    <div id="compose-result"></div>
                </div>

                <div id="summarize-tab" class="tab-content">
                    <div class="form-group">
                        <label>Email Content</label>
                        <textarea id="summarize-content" rows="6" placeholder="Paste email content to summarize..."></textarea>
                    </div>
                    <button onclick="summarizeContent()">Summarize</button>
                    <div id="summarize-result"></div>
                </div>

                <div id="respond-tab" class="tab-content">
                    <div class="form-group">
                        <label>Original Email</label>
                        <textarea id="respond-email" rows="6" placeholder="Paste the email you want to respond to..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Tone</label>
                        <select id="respond-tone">
                            <option value="professional">Professional</option>
                            <option value="friendly">Friendly</option>
                            <option value="formal">Formal</option>
                        </select>
                    </div>
                    <button onclick="generateResponse()">Generate Response</button>
                    <div id="respond-result"></div>
                </div>
            </div>

            <div class="card">
                <h2>Email Messages</h2>
                <div class="form-group">
                    <select id="message-account">
                        <option value="">Select account...</option>
                    </select>
                </div>
                <button onclick="loadMessages()">Load Messages</button>
                <div class="email-list" id="email-list"></div>
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2>Send Email (SMTP)</h2>
            <div class="form-group">
                <label>From</label>
                <input type="email" id="smtp-from" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>To</label>
                <input type="email" id="smtp-to" placeholder="recipient@email.com">
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="smtp-subject" placeholder="Email subject">
            </div>
            <div class="form-group">
                <label>Body</label>
                <textarea id="smtp-body" rows="4" placeholder="Email body"></textarea>
            </div>
            <button onclick="sendEmail()">Send Email</button>
            <div id="smtp-status"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let currentUserId = null;

        async function apiCall(endpoint, method = 'GET', data = null) {
            const options = {
                method,
                headers: {'Content-Type': 'application/json'}
            };
            if (data) {
                options.body = JSON.stringify(data);
            }
            const response = await fetch(`${API_BASE}${endpoint}`, options);
            return response.json();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
        }

        async function composeEmail() {
            const btn = document.getElementById('compose-btn');
            btn.disabled = true;
            btn.textContent = 'Generating...';

            const result = await apiCall('/ai/compose', 'POST', {
                user_id: currentUserId,
                prompt: `Recipient: ${document.getElementById('compose-recipient').value}\nContext: ${document.getElementById('compose-context').value}\nTone: ${document.getElementById('compose-tone').value}`
            });

            const resultDiv = document.getElementById('compose-result');
            if (result.status === 'submitted') {
                resultDiv.className = 'status success';
                resultDiv.textContent = `Email composed successfully! Request ID: ${result.request_id}`;
            } else {
                resultDiv.className = 'status error';
                resultDiv.textContent = 'Error: ' + (result.error || 'Failed to compose email');
            }

            btn.disabled = false;
            btn.textContent = 'Generate Email';
        }

        async function summarizeContent() {
            const result = await apiCall('/ai/summarize', 'POST', {
                user_id: currentUserId,
                content: document.getElementById('summarize-content').value
            });

            const resultDiv = document.getElementById('summarize-result');
            if (result.status === 'submitted') {
                resultDiv.className = 'status success';
                resultDiv.textContent = `Summary generated! Request ID: ${result.request_id}`;
            } else {
                resultDiv.className = 'status error';
                resultDiv.textContent = 'Error: ' + (result.error || 'Failed to summarize');
            }
        }

        async function generateResponse() {
            const result = await apiCall('/ai/compose', 'POST', {
                user_id: currentUserId,
                prompt: `Original Email: ${document.getElementById('respond-email').value}\nTone: ${document.getElementById('respond-tone').value}\nTask: Generate a response`
            });

            const resultDiv = document.getElementById('respond-result');
            if (result.status === 'submitted') {
                resultDiv.className = 'status success';
                resultDiv.textContent = `Response generated! Request ID: ${result.request_id}`;
            } else {
                resultDiv.className = 'status error';
                resultDiv.textContent = 'Error: ' + (result.error || 'Failed to generate response');
            }
        }

        async function connectEmailAccount() {
            const provider = document.getElementById('email-provider').value;
            if (!provider) {
                alert('Please select an email provider');
                return;
            }

            const authEndpoint = provider === 'gmail' ? '/auth/gmail/init' : '/auth/outlook/init';
            const result = await apiCall(authEndpoint);

            if (result.auth_url) {
                window.open(result.auth_url, '_blank', 'width=600,height=700');
            }
        }

        async function loadMessages() {
            const accountId = document.getElementById('message-account').value;
            if (!accountId) {
                alert('Please select an account');
                return;
            }

            const result = await apiCall(`/email-accounts/${accountId}/messages`);
            const listDiv = document.getElementById('email-list');

            if (result.messages) {
                listDiv.innerHTML = result.messages.map(msg => `
                    <div class="email-item ${msg.is_read ? '' : 'unread'}">
                        <div class="email-subject">${msg.subject || 'No Subject'}</div>
                        <div class="email-sender">${msg.sender}</div>
                        <div class="email-preview">${msg.body_text ? msg.body_text.substring(0, 100) : ''}</div>
                    </div>
                `).join('');
            } else {
                listDiv.innerHTML = '<p>No messages found</p>';
            }
        }

        async function sendEmail() {
            const result = await apiCall('/email/send', 'POST', {
                user_id: currentUserId,
                from: document.getElementById('smtp-from').value,
                to: document.getElementById('smtp-to').value,
                subject: document.getElementById('smtp-subject').value,
                body: document.getElementById('smtp-body').value
            });

            const statusDiv = document.getElementById('smtp-status');
            if (result.status === 'sent') {
                statusDiv.className = 'status success';
                statusDiv.textContent = 'Email sent successfully!';
            } else {
                statusDiv.className = 'status error';
                statusDiv.textContent = 'Error: ' + (result.error || 'Failed to send email');
            }
        }

        async function init() {
            const health = await apiCall('/health');
            console.log('API Health:', health);
        }

        init();
    </script>
</body>
</html>
